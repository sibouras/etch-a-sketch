<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <title>Etch a Sketch</title>
  </head>
  <body>
    <div class="container">
      <h1>Etch A Sketch</h1>
      <div class="buttons">
        <button class="color-choice" data-color="black">Black</button>
        <button class="color-choice" data-color="rainbow">Rainbow</button>
        <button class="color-choice" data-color="gray">Gray</button>
        <button class="color-choice" data-color="eraser">Eraser</button>
        <button class="color-choice">
          Pick: <input type="color" value="#ff0000" id="input-color" />
        </button>
      </div>
      <!-- <button id="reset-button">Change size</button> -->
      <div id="grid-container" class="grid"></div>
      <div class="grid-options">
        <button class="clear">Clear</button>
        <div class="size-container">
          <p>Pixel Size</p>
          <input
            type="range"
            min="4"
            max="100"
            value="16"
            id="sizeRange"
            class="slider"
          />
          <p>Smallest to Largest</p>
        </div>
      </div>
    </div>
  </body>
</html>
